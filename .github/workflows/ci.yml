name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.13"]
        exclude:
          # actions/setup-python has no CPython 3.9 build for Apple Silicon.
          - os: macos-latest
            python-version: "3.9"
        include:
          # CPython 3.9 needs an Intel runner; there is no arm64 build.
          - os: macos-15-intel
            python-version: "3.9"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --disable-pip-version-check setuptools
      - run: python setup.py check
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q src tests
