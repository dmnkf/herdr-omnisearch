[herdr]
# Override when herdr is not on PATH.
bin = herdr
fallback_cwd = ~

[archive]
# Archive indexing reads local agent conversation histories and is disabled by default.
enabled = false
# Use 0 for no limit. Public defaults keep index growth bounded.
max_files = 500
since_days = 90
agents = codex, claude

[archive.codex]
sessions = ~/.codex/sessions/**/*.jsonl
thread_names = ~/.codex/session_index.jsonl
resume = codex resume -C "{cwd}" {session_id}
# Native uses `herdr agent start`; shell runs the complete resume command in the pane.
launcher = agent
kind = codex
start_timeout_ms = 60000

[archive.claude]
sessions = ~/.claude/projects/*/*.jsonl
resume = claude --resume {session_id}
launcher = agent
kind = claude
start_timeout_ms = 60000

[skip]
pane_label_contains = omnisearch
unknown_without_agent = true
# One pair per line or comma separated. Format: workspace label|cwd
workspace_cwd_pairs =

[workspace_labels]
# Strip date prefixes like 20260609- automatically. These extra prefixes are optional.
strip_prefixes =
# If cwd contains one of these path parts, the following path part becomes the space label.
worktree_markers = worktrees
remove_words =

[workspace_labels.exact]
# /path/to/project = Friendly Space Name
